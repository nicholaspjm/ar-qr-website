<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <rect width="700" height="1000" fill="url(#bg)"/>
  <rect width="700" height="1000" fill="url(#glow)"/>

  <!-- corner brackets -->
  <g stroke="#7dd3fc" stroke-width="6" fill="none" opacity="0.85">
    <path d="M40 90 L40 40 L90 40"/>
    <path d="M660 40 L610 40 M660 40 L660 90"/>
    <path d="M40 910 L40 960 L90 960"/>
    <path d="M660 960 L610 960 M660 960 L660 910"/>
  </g>

  <!-- title -->
  <g font-family="Helvetica, Arial, sans-serif" fill="#ffffff" text-anchor="middle">
    <text x="350" y="220" font-size="72" font-weight="800" letter-spacing="4">AR LIVE</text>
    <text x="350" y="280" font-size="28" font-weight="300" letter-spacing="6" fill="#7dd3fc">FLOATING POSTER</text>
  </g>

  <!-- decorative rings -->
  <g fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.6">
    <circle cx="350" cy="500" r="180"/>
    <circle cx="350" cy="500" r="140"/>
    <circle cx="350" cy="500" r="100"/>
  </g>
  <circle cx="350" cy="500" r="60" fill="#fbbf24" opacity="0.85"/>
  <circle cx="350" cy="500" r="60" fill="none" stroke="#ffffff" stroke-width="3"/>

  <!-- bottom tagline -->
  <g font-family="Helvetica, Arial, sans-serif" fill="#ffffff" text-anchor="middle">
    <text x="350" y="780" font-size="24" font-weight="300" letter-spacing="3">tracked in real time to the HIRO marker</text>
    <text x="350" y="820" font-size="20" font-weight="300" opacity="0.8" letter-spacing="2">move your phone — the poster moves with it</text>
    <text x="350" y="900" font-size="16" font-weight="500" letter-spacing="6" fill="#7dd3fc">A-FRAME + AR.JS</text>
  </g>
</svg>
