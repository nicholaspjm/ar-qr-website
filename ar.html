<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>AR Experience</title>

  <!-- Pinned to a known-good combination. A-Frame 1.3.0 + AR.js 3.4.5
       is the most battle-tested combo for marker tracking on mobile. -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #fff;
    }

    /* === The CSS fix for the black-camera bug ===
       AR.js inserts a <video> element. By default it can be sized 0×0 or
       stacked behind the body. Force it fullscreen, behind everything. */
    video {
      position: fixed !important;
      top: 50% !important;
      left: 50% !important;
      transform: translate(-50%, -50%) !important;
      min-width: 100% !important;
      min-height: 100% !important;
      width: auto !important;
      height: auto !important;
      object-fit: cover !important;
      z-index: -2 !important;
      display: block !important;
      background: #000;
    }
    .a-canvas {
      background: transparent !important;
      z-index: -1 !important;
    }
    .a-enter-vr, .a-orientation-modal { display: none !important; }
    /* ============================================ */

    #hint {
      position: fixed; top: 12px; left: 12px; right: 12px; z-index: 10;
      background: rgba(0,0,0,0.62); color: #fff;
      padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: opacity 0.6s ease;
    }
    #hint b { color: #6cf; }
    #hint.hidden { opacity: 0; pointer-events: none; }
    #back {
      position: fixed; bottom: 16px; left: 16px; z-index: 10;
      background: rgba(0,0,0,0.62); color: #fff; text-decoration: none;
      padding: 8px 14px; border-radius: 999px; font-size: 13px;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }

    #log {
      position: fixed; bottom: 60px; left: 12px; right: 12px; z-index: 10;
      background: rgba(0,0,0,0.7); color: #9cf;
      padding: 8px 12px; border-radius: 8px; font-size: 11px; line-height: 1.4;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      max-height: 180px; overflow-y: auto;
    }
    #log .err { color: #fca5a5; }
    #log .ok { color: #86efac; }
  </style>
</head>
<body>
  <div id="hint">
    <b>Point your camera at the marker</b><br/>
    Aim your phone at the black <b>HIRO</b> square shown on the QR page.
  </div>
  <a id="back" href="index.html">&larr; back</a>
  <div id="log"></div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; precision: medium; antialias: true; alpha: true;"
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">

    <a-assets timeout="10000">
      <img id="posterTexture" crossorigin="anonymous" src="poster-art.svg" />
    </a-assets>

    <a-marker preset="hiro" id="marker" smooth="true" smoothCount="8" smoothTolerance="0.01" smoothThreshold="3">

      <a-entity position="0 0.75 0"
        animation="property: position; to: 0 0.95 0; dir: alternate; loop: true; dur: 2400; easing: easeInOutSine">
        <a-plane
          src="#posterTexture"
          width="1.4" height="2.0"
          material="transparent: true; alphaTest: 0.01; side: double"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 9000; easing: linear">
        </a-plane>
        <a-plane
          color="#7dd3fc" opacity="0.18"
          width="1.7" height="2.3"
          position="0 0 -0.02"
          material="transparent: true; side: double">
        </a-plane>
      </a-entity>

      <a-cylinder position="0 0.05 0" radius="0.04" height="0.1"
        color="#7dd3fc" opacity="0.7" material="transparent: true">
      </a-cylinder>

      <a-entity position="0 -0.15 0" rotation="-90 0 0">
        <a-text value="AR ACTIVE" align="center" color="#7dd3fc" width="3"></a-text>
      </a-entity>

      <a-sphere position="0.7 0.6 0.3" radius="0.04" color="#fbbf24"
        animation="property: position; to: 0.7 1.1 0.3; dir: alternate; loop: true; dur: 1800; easing: easeInOutSine"></a-sphere>
      <a-sphere position="-0.7 0.9 -0.3" radius="0.05" color="#a78bfa"
        animation="property: position; to: -0.7 1.4 -0.3; dir: alternate; loop: true; dur: 2200; easing: easeInOutSine"></a-sphere>
      <a-sphere position="0.4 1.3 -0.4" radius="0.035" color="#34d399"
        animation="property: position; to: 0.4 0.8 -0.4; dir: alternate; loop: true; dur: 2000; easing: easeInOutSine"></a-sphere>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // On-screen log so we can see what's happening on the phone where there's
    // no devtools. Tap the back button to dismiss the page if it's noisy.
    const logBox = document.getElementById('log');
    function log(msg, cls) {
      const line = document.createElement('div');
      if (cls) line.className = cls;
      line.textContent = '[' + new Date().toISOString().substr(11, 8) + '] ' + msg;
      logBox.appendChild(line);
      logBox.scrollTop = logBox.scrollHeight;
    }
    log('boot ok, ua=' + navigator.userAgent.substr(0, 60));
    log('https=' + (location.protocol === 'https:') + ' host=' + location.host);
    log('mediaDevices=' + !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));

    window.addEventListener('error', (e) => {
      log('JS ERR: ' + (e.message || '') + ' @ ' + (e.filename || '').split('/').pop() + ':' + e.lineno, 'err');
    });
    window.addEventListener('unhandledrejection', (e) => {
      log('PROMISE REJ: ' + ((e.reason && e.reason.message) || String(e.reason)), 'err');
    });

    // Watch for the AR.js video element to actually appear and start playing.
    let videoCheckCount = 0;
    const videoCheck = setInterval(() => {
      videoCheckCount++;
      const v = document.querySelector('video');
      if (v) {
        log('video el found: ' + v.videoWidth + 'x' + v.videoHeight + ' readyState=' + v.readyState, v.videoWidth > 0 ? 'ok' : null);
        if (v.videoWidth > 0) {
          clearInterval(videoCheck);
          log('camera streaming ok', 'ok');
        }
      } else if (videoCheckCount > 20) {
        clearInterval(videoCheck);
        log('NO VIDEO ELEMENT after 10s — AR.js never started camera', 'err');
      }
    }, 500);

    document.querySelector('a-scene').addEventListener('loaded', () => log('a-scene loaded', 'ok'));
    document.querySelector('a-scene').addEventListener('arjs-video-loaded', () => log('arjs-video-loaded', 'ok'));

    const marker = document.querySelector('#marker');
    const hint = document.getElementById('hint');
    let seen = false;
    marker.addEventListener('markerFound', () => {
      log('markerFound', 'ok');
      if (seen) return;
      seen = true;
      setTimeout(() => hint.classList.add('hidden'), 800);
    });
    marker.addEventListener('markerLost', () => {
      log('markerLost');
      hint.classList.remove('hidden');
      hint.innerHTML = '<b>Marker lost</b><br/>Aim back at the HIRO square to bring the AR poster back.';
    });
  </script>
</body>
</html>
