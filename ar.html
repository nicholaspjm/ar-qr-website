<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>AR Experience</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.js"></script>
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #fff;
    }

    /* ---------- The fix that matters ---------- */
    /* AR.js inserts a <video id="arjs-video"> for the camera feed. By default
       it can end up sized 0×0 or stacked behind the body background, leaving
       a black screen. Force it to fill the viewport, behind everything. */
    video, #arjs-video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: -2 !important;
      background: #000;
      display: block !important;
    }
    /* A-Frame's WebGL canvas must be transparent so the video shows through. */
    .a-canvas, canvas.a-canvas {
      background: transparent !important;
      z-index: -1 !important;
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
    }
    .a-enter-vr, .a-orientation-modal { display: none !important; }
    /* ------------------------------------------ */

    #hint {
      position: fixed; top: 12px; left: 12px; right: 12px; z-index: 10;
      background: rgba(0,0,0,0.62); color: #fff;
      padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: opacity 0.6s ease;
    }
    #hint b { color: #6cf; }
    #hint.hidden { opacity: 0; pointer-events: none; }
    #back {
      position: fixed; bottom: 16px; left: 16px; z-index: 10;
      background: rgba(0,0,0,0.62); color: #fff; text-decoration: none;
      padding: 8px 14px; border-radius: 999px; font-size: 13px;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }

    /* Tap-to-start gate */
    #gate {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(circle at 50% 30%, #1e3a8a 0%, #0b0f1a 70%);
      padding: 24px; text-align: center;
    }
    #gate h1 {
      font-size: 28px; margin: 0 0 8px;
      background: linear-gradient(90deg, #fff, #7dd3fc);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    #gate p { color: #cbd5e1; margin: 0 0 28px; max-width: 320px; line-height: 1.5; font-size: 15px; }
    #start-btn {
      padding: 16px 40px; font-size: 17px; font-weight: 700; letter-spacing: 0.3px;
      border: 0; border-radius: 999px; cursor: pointer;
      background: linear-gradient(135deg, #7dd3fc, #a78bfa);
      color: #0b0f1a; box-shadow: 0 10px 30px rgba(125,211,252,0.4);
    }
    #start-btn:active { transform: scale(0.97); }

    #err {
      position: fixed; top: 12px; left: 12px; right: 12px; z-index: 200;
      background: #7f1d1d; color: #fff; padding: 12px 14px; border-radius: 10px;
      font-size: 13px; line-height: 1.4; display: none; word-break: break-word;
    }
    #err b { display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div id="err"></div>

  <div id="gate">
    <h1>AR Floating Poster</h1>
    <p>When you tap Start, your browser will ask to use the camera. Aim it at the HIRO marker on the QR page.</p>
    <button id="start-btn">Start AR</button>
  </div>

  <div id="hint" style="display:none;">
    <b>Point your camera at the marker</b><br/>
    Open the QR poster on your computer (or print it) and aim your phone at the black <b>HIRO</b> square.
  </div>
  <a id="back" href="index.html" style="display:none;">&larr; back</a>

  <!-- The AR scene is inside a template so it isn't parsed/started until the
       user taps. This guarantees a fresh user gesture for the camera prompt
       (matters on iOS Safari) and lets us show a clean error if anything fails. -->
  <template id="ar-scene-tpl">
    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; precision: medium; antialias: true; alpha: true; colorManagement: true;"
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3; videoTexture: true; trackingMethod: best;">

      <a-assets timeout="10000">
        <img id="posterTexture" crossorigin="anonymous" src="poster-art.svg" />
      </a-assets>

      <a-marker preset="hiro" id="marker" smooth="true" smoothCount="8" smoothTolerance="0.01" smoothThreshold="3">

        <a-entity position="0 0.75 0"
          animation="property: position; to: 0 0.95 0; dir: alternate; loop: true; dur: 2400; easing: easeInOutSine">
          <a-plane
            src="#posterTexture"
            width="1.4" height="2.0"
            material="transparent: true; alphaTest: 0.01; side: double"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 9000; easing: linear">
          </a-plane>
          <a-plane
            color="#7dd3fc" opacity="0.18"
            width="1.7" height="2.3"
            position="0 0 -0.02"
            material="transparent: true; side: double">
          </a-plane>
        </a-entity>

        <a-cylinder position="0 0.05 0" radius="0.04" height="0.1"
          color="#7dd3fc" opacity="0.7" material="transparent: true">
        </a-cylinder>

        <a-entity position="0 -0.15 0" rotation="-90 0 0">
          <a-text value="AR ACTIVE" align="center" color="#7dd3fc" width="3"></a-text>
        </a-entity>

        <a-sphere position="0.7 0.6 0.3" radius="0.04" color="#fbbf24"
          animation="property: position; to: 0.7 1.1 0.3; dir: alternate; loop: true; dur: 1800; easing: easeInOutSine"></a-sphere>
        <a-sphere position="-0.7 0.9 -0.3" radius="0.05" color="#a78bfa"
          animation="property: position; to: -0.7 1.4 -0.3; dir: alternate; loop: true; dur: 2200; easing: easeInOutSine"></a-sphere>
        <a-sphere position="0.4 1.3 -0.4" radius="0.035" color="#34d399"
          animation="property: position; to: 0.4 0.8 -0.4; dir: alternate; loop: true; dur: 2000; easing: easeInOutSine"></a-sphere>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </template>

  <script>
    const errBox = document.getElementById('err');
    function showError(title, detail) {
      errBox.style.display = 'block';
      errBox.innerHTML = '<b>' + title + '</b>' + (detail ? String(detail) : '');
    }
    window.addEventListener('error', (e) => {
      showError('Script error', (e.message || '') + ' @ ' + (e.filename || '') + ':' + (e.lineno || ''));
    });
    window.addEventListener('unhandledrejection', (e) => {
      showError('Promise rejected', (e.reason && e.reason.message) || String(e.reason));
    });

    document.getElementById('start-btn').addEventListener('click', async () => {
      const gate = document.getElementById('gate');
      const startBtn = document.getElementById('start-btn');
      startBtn.disabled = true;
      startBtn.textContent = 'Requesting camera…';

      // 1. Probe getUserMedia ourselves first — this gives a clean, controllable
      //    error path. AR.js will then reuse the granted permission silently.
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error('Camera API not available. Use Safari (iOS) or Chrome (Android) over HTTPS.');
        }
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } },
          audio: false
        });
        // Immediately stop our probe stream — AR.js will open its own.
        stream.getTracks().forEach(t => t.stop());
      } catch (e) {
        startBtn.disabled = false;
        startBtn.textContent = 'Start AR';
        showError('Camera blocked', (e && e.message) || String(e));
        return;
      }

      // 2. Mount the AR scene now that we have a fresh gesture + permission.
      const tpl = document.getElementById('ar-scene-tpl');
      document.body.appendChild(tpl.content.cloneNode(true));

      gate.style.display = 'none';
      document.getElementById('hint').style.display = '';
      document.getElementById('back').style.display = '';

      // 3. Wire up marker events once the scene mounts.
      const tryAttach = () => {
        const marker = document.querySelector('#marker');
        if (!marker) return setTimeout(tryAttach, 100);
        const hint = document.getElementById('hint');
        let seen = false;
        marker.addEventListener('markerFound', () => {
          if (seen) return;
          seen = true;
          setTimeout(() => hint.classList.add('hidden'), 800);
        });
        marker.addEventListener('markerLost', () => {
          hint.classList.remove('hidden');
          hint.innerHTML = '<b>Marker lost</b><br/>Aim back at the HIRO square to bring the AR poster back.';
        });
      };
      tryAttach();
    });
  </script>
</body>
</html>
